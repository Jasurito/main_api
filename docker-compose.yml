services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: daddb
      POSTGRES_USER: daduser
      POSTGRES_PASSWORD: dadpass

      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: daddb
      MONGO_USER: daduser
      MONGO_PASSWORD: dadpass

      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USER: elastic
      ELASTICSEARCH_PASSWORD: dadpass
      ELASTICSEARCH_VERIFY_CERTS: "false"

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_CONSUMER_GROUP_ID: main-api
      KAFKA_AUTO_OFFSET_RESET: earliest
      KAFKA_USER_EVENTS_TOPIC: user-events
      KAFKA_PRODUCT_EVENTS_TOPIC: product-events
      KAFKA_CART_EVENTS_TOPIC: cart-events
      KAFKA_ORDER_EVENTS_TOPIC: order-events
      KAFKA_FLASH_SALE_EVENTS_TOPIC: flash-sale-events

      JWT_SECRET_KEY: test-secret-change-later
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60

      STORAGE_ENDPOINT: http://rustfs:9000
      STORAGE_ACCESS_KEY: daduser
      STORAGE_SECRET_KEY: dadpass
      STORAGE_BUCKET: dad-storage
      # client-facing URL (host-side); used to build image URLs returned to users
      STORAGE_BASE_URL: http://localhost:9000/dad-storage

    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rustfs:
        condition: service_started

  worker:
    build: ../worker
    ports:
      - "8001:8001"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: daddb
      POSTGRES_USER: daduser
      POSTGRES_PASSWORD: dadpass

      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: daddb
      MONGO_USER: daduser
      MONGO_PASSWORD: dadpass

      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USER: elastic
      ELASTICSEARCH_PASSWORD: dadpass
      ELASTICSEARCH_VERIFY_CERTS: "false"

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_CONSUMER_GROUP_ID: worker
      KAFKA_AUTO_OFFSET_RESET: earliest
      KAFKA_USER_REGISTERED_TOPIC: user.registered

      STORAGE_ENDPOINT: http://rustfs:9000
      STORAGE_ACCESS_KEY: daduser
      STORAGE_SECRET_KEY: dadpass
      STORAGE_BUCKET: dad-storage

      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      ADMIN_FULL_NAME: Admin

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daddb
      POSTGRES_USER: daduser
      POSTGRES_PASSWORD: dadpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daduser -d daddb"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: daduser
      MONGO_INITDB_ROOT_PASSWORD: dadpass
      MONGO_INITDB_DATABASE: daddb
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: elasticsearch:8.13.4
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      ELASTIC_PASSWORD: dadpass
      xpack.security.enabled: "true"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:dadpass http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 15

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: dad-local-cluster

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  rustfs:
    image: rustfs/rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: daduser
      RUSTFS_SECRET_KEY: dadpass
    volumes:
      - rustfs_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  mongo_data:
  elasticsearch_data:
  kafka_data:
  rustfs_data:
